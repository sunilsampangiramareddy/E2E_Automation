[pytest]
addopts = --headed --browser_type chromium --html=reports/report.html --self-contained-html --slowmo=200 --alluredir=reports/allure-results --reruns 2
testpaths = tests
markers =
    smoke: mark a test as a smoke test.
    regression: mark a test as a regression test.
    master: mark a test as part of the master group (both smoke and regression).